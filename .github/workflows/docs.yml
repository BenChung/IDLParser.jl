name: Documentation

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:

# deploydocs pushes built HTML to the gh-pages branch via GITHUB_TOKEN.
permissions:
  contents: write
  statuses: write

jobs:
  docs:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate docs environment
        run: julia --project=ROSNode/docs -e 'using Pkg; Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=ROSNode/docs ROSNode/docs/make.jl
